<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Zahlenratespiel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        body.dark {
            background-color: #222;
            color: white;
        }

        body.light {
            background-color: white;
            color: #222;
        }

        .box {
            border: 1px solid gray;
            padding: 20px;
            margin-top: 20px;
        }

        input,
        button {
            padding: 8px;
            margin: 5px;
        }

        #message {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Zahlenratespiel</h1>

    <p id="clock"></p>
    <p id="themeInfo"></p>

    <div class="box">
        <p>
            Ich habe mir eine Zahl zwischen 1 und 100 ausgedacht.
            Kannst du sie erraten?
        </p>

        <input type="number" id="guess" min="1" max="100">
        <button id="guessButton">Raten</button>

        <p id="message"></p>
    </div>

</body>

</html>
